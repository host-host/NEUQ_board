<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>实时语音翻译</title>
    <style>
        body {
            font-size: 30px;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        #translation {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            min-height: 100px;
            white-space: pre-wrap; /* 保留文本换行 */
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }

        .pending {
            color: blue;
        }

        /* 新增行内元素样式 */
        .translation-segment {
            display: inline;
            margin-right: 0.2em;
        }
    </style>
</head>

<body>
    <h1>实时语音翻译</h1>
    <!-- <label for="languageSelect">选择输出语言:</label>
    <select id="languageSelect">
        <option value="default">default</option>
        <option value="zh">中文</option>
        <option value="en">英文</option>
    </select><br> -->
    <button id="startBtn">start</button>
    <button id="stopBtn" disabled>stop</button>
    <div id="translation"></div>

    <script>
        let mediaRecorder;
        let audioStream;
        let clientId;

        document.getElementById('startBtn').onclick = async () => {
            clientId = Math.random().toString(36).substring(2);
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                let mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' 
                          : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' 
                          : null;
                
                if (!mimeType) throw new Error('No supported MIME type found');

                mediaRecorder = new MediaRecorder(audioStream, { mimeType });

                mediaRecorder.ondataavailable = async (event) => {
                    const audioBlob = event.data;
                    try {
                        const response = await fetch('/api1002/video', {
                            method: 'POST',
                            body: createFormData(audioBlob, clientId)
                        });

                        const result = await response.json();
                        if (result.translations) {
                            const translationDiv = document.getElementById('translation');
                            
                            // 移除未确认的临时翻译
                            const children = Array.from(translationDiv.children);
                            children.forEach(child => {
                                const startTime = parseFloat(child.dataset.start);
                                if (startTime >= result.lasttime) {
                                    translationDiv.removeChild(child);
                                } else {
                                    child.classList.remove('pending');
                                }
                            });

                            // 添加新翻译内容
                            result.translations.forEach(translation => {
                                const segment = document.createElement('span');
                                segment.className = 'translation-segment';
                                segment.textContent = translation.text+" | "+ translation.trans;
                                segment.dataset.start = translation.start;
                                
                                if (translation.start + 0.02 >= result.newlasttime) {
                                    segment.classList.add('pending');
                                }
                                
                                // 添加空格分隔语句
                                // if (translationDiv.lastChild && !translationDiv.lastChild.classList.contains('pending')) {
                                //     segment.textContent = ' ' + segment.textContent;
                                // }
                                
                                translationDiv.appendChild(segment);
                            });
                        }
                    } catch (error) {
                        console.error('翻译失败:', error);
                    }
                };
                
                mediaRecorder.start(1000);
                toggleButtons(true);
            } catch (error) {
                console.error('无法访问麦克风:', error);
            }
        };

        document.getElementById('stopBtn').onclick = () => {
            mediaRecorder.stop();
            audioStream.getTracks().forEach(track => track.stop());
            toggleButtons(false);
        };

        function toggleButtons(recording) {
            document.getElementById('startBtn').disabled = recording;
            document.getElementById('stopBtn').disabled = !recording;
        }

        function createFormData(blob, id) {
            const formData = new FormData();
            formData.append('audio', blob, 'recording.webm');
            formData.append('id', id);
            formData.append('model', 'large-v3');
            formData.append('language', 'default');
            return formData;
        }
    </script>
</body>

</html>
