<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI</title>
    <script src="/cdn/cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/cdn/cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="/cdn/highlight.css">
    <link rel="stylesheet" href="/cdn/cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="/cdn/cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="/cdn/cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="/cdn/cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <script src="/cdn/cdnjs.cloudflare.com/ajax/libs/dompurify/3.4.8/purify.min.js"></script>
    <link rel="stylesheet" href="style0610.css?v=0718">
</head>
<body>
    <div id="selectionModal" class="modal">
        <div class="modal-content ai-container">
            <span class="close" onclick="document.getElementById('selectionModal').style.display = 'none'">&times;</span>
            <h3 class="modal-title">免费模型</h3>
            <div id="modelsContainer"></div>
            <h3 class="modal-title" style="margin-top:20px; border-top: 1px solid var(--border-color); padding-top: 15px;">授权模型 (联系 NIT 开通)</h3>
            <div id="modelsContainer2"></div>
        </div>
    </div>
    <div class="app-layout">
        <aside class="sidebar-aside" id="sidebarPanel">
            <div class="sidebar-logo">
                <a href="/gpt">
                    <img src="/newintown.png" alt="newintown logo" class="sidebar-logo-img">
                </a>
            </div>
            <button class="new-chat-btn" onclick="startNewChat()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                新建对话
            </button>
            <div class="history-heading">
                <button class="history-toggle-btn" onclick="toggleHistoryList()">
                    <span>历史记录</span>
                    <svg id="historyToggleIcon" class="history-toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
                <button class="history-manage-btn" id="historyManageBtn" onclick="enterBatchDeleteMode()" title="批量管理历史记录" style="display:none;">管理</button>
            </div>
            <div class="history-batch-toolbar" id="historyBatchToolbar" style="display:none;">
                <label class="history-select-all">
                    <input type="checkbox" id="historySelectAll" onchange="toggleSelectAllHistory(this.checked)">
                    <span id="historySelectedCount">已选 0 项</span>
                </label>
                <div class="history-batch-actions">
                    <button class="history-batch-cancel" onclick="exitBatchDeleteMode()">取消</button>
                    <button class="history-batch-delete" id="historyBatchDeleteBtn" onclick="deleteSelectedHistory()" disabled>删除</button>
                </div>
            </div>
            <div class="history-list-container" id="historyList">
                <div class="history-loading">加载历史中...</div>
            </div>
            <div class="sidebar-footer">
                <div class="user-section">
                    <a href="/login" id="drop" class="login-link">登录</a>
                    <div id="userContainer" style="display: none;" class="user-container">
                        <span id="username" class="user-name"></span>
                        <div class="user-menu">
                            <a href="/profile" class="user-menu-item">修改密码</a>
                            <a href="#" onclick="handleLogout(event)" class="user-menu-item logout">注销</a>
                        </div>
                    </div>
                </div>
                <div class="model-section">
                    <button class="button-choice-sidebar" id="selectButton" onclick="document.getElementById('selectionModal').style.display = 'block'">载入中...</button>
                </div>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
        <main class="chat-main">
            <div class="chat-header-bar">
                <button class="sidebar-toggle-btn" onclick="toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="header-chat-title-container">
                    <div class="header-chat-title" id="currentChatTitleDisplay">新对话</div>
                    <button class="header-action-btn" id="renameChatBtn" onclick="renameCurrentChat()" title="重命名对话" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                </div>
                <div class="header-right-actions">
                    <button class="header-share-btn" id="shareChatBtn" onclick="shareCurrentChat()" title="分享此对话" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 4px;"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                        分享
                    </button>
                </div>
            </div>
            <div class="chat-box-viewport">
                <div class="chat-box" id="chatBox">
                    <div class="welcome-box" id="welcomeBox">
                        <h2>您好！我是您的 AI 助手</h2>
                        <p>请在下方输入框中输入您的问题，或者从左侧历史记录中继续先前的对话。</p>
                    </div>
                </div>
            </div>
            <div class="bottom-area">
                <div id="pendingFilesContainer" class="pending-files-container" style="display:none;"></div>
                
                <div class="input-wrap-box" id="inputWrapBox">
                    <div class="drag-overlay">📎 松开以添加文件</div>
                    <textarea class="gpt-input" id="input" placeholder="输入消息..." spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
                    <div class="control-panel">
                        <span class="word-count" id="wordCount">0 字符</span>
                        <div style="display:flex; align-items:center; gap: 8px;">
                            <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(this)" accept=".txt,.md,.json,.csv,.pdf,.docx,.xlsx,.png,.jpg,.jpeg,.gif,.webp" multiple>
                            <button class="copy-btn" onclick="document.getElementById('fileInput').click()" title="支持文本, PDF, Word, Excel 及图片 (PNG, JPG, GIF, WEBP)" style="display: flex; align-items: center; gap: 4px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                                附件
                            </button>
                            <div class="request-settings-wrap">
                                <button class="request-settings-btn" onclick="toggleRequestSettings(event)" title="调整请求参数" aria-label="调整请求参数">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"></path></svg>
                                </button>
                                <div id="requestSettingsPopover" class="request-settings-popover" onclick="event.stopPropagation()">
                                    <div id="maxTokensPresets" class="max-tokens-presets">
                                        <span class="max-tokens-label">max_tokens</span>
                                        <button class="max-tokens-option active" data-value="" onclick="setMaxTokensPreset('', event)">默认</button>
                                        <button class="max-tokens-option" data-value="4096" onclick="setMaxTokensPreset(4096, event)">4K</button>
                                        <button class="max-tokens-option" data-value="16384" onclick="setMaxTokensPreset(16384, event)">16K</button>
                                        <button class="max-tokens-option" data-value="32768" onclick="setMaxTokensPreset(32768, event)">32K</button>
                                        <button class="max-tokens-option" onclick="showCustomMaxTokens()">输入</button>
                                    </div>
                                    <div id="maxTokensCustom" class="max-tokens-custom" style="display:none;">
                                        <button class="max-tokens-back" onclick="showMaxTokensPresets()" title="返回预设">‹</button>
                                        <input type="number" id="settingsMaxTokens" min="1" step="1" placeholder="max_tokens" oninput="setCustomMaxTokens(this.value)">
                                        <span>tokens</span>
                                    </div>
                                </div>
                            </div>
                            
                            <svg viewBox="25 25 50 50" class="loading_svg" id="loading_tradeP" style="display:none; width:24px; height:24px;">
                                <circle r="20" cy="50" cx="50" class="loading_circle"></circle>
                            </svg>
                            <button class="button-gpt" id="sendButton" onclick="sendMessage()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                                发送
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="utils.js"></script><!-- 工具函数 -->
    <script src="ui0601_2204.js"></script><!-- 渲染ui -->
    <script src="api0714.js?v=0718"></script><!-- 数据接口与网络请求 -->
    <script src="app0714.js"></script><!-- 其他函数 -->
</body>
</html>
